<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neo Coffee</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        :root { --main: #1ed760; --bg: #000; --card: #111; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Анимации */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .container { max-width: 450px; margin: 0 auto; padding: 25px; padding-bottom: 140px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .logo { font-weight: 900; font-size: 24px; letter-spacing: -1px; cursor: pointer; color: var(--text); text-transform: uppercase; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        
        .lang-btn { background: #111; border: 1px solid #222; color: #555; padding: 8px 14px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .lang-btn.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        .menu-item { background: var(--card); border: 1px solid #222; border-radius: 28px; padding: 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .menu-item:active { transform: scale(0.97); background: #151515; }
        .menu-info { display: flex; align-items: center; gap: 18px; }
        .menu-icon { font-size: 34px; }
        .name { font-weight: 800; font-size: 18px; margin-bottom: 4px; }
        .price { color: #888; font-size: 15px; }
        .add-btn { background: var(--main); color: #000; border: none; width: 46px; height: 46px; border-radius: 16px; font-weight: 900; font-size: 26px; cursor: pointer; box-shadow: 0 4px 15px rgba(30,215,96,0.3); }

        /* Центрированная корзина со свечением */
        .cart-trigger { 
            position: fixed; bottom: 30px; left: 5%; width: 90%; 
            background: var(--main); color: #000; padding: 22px; 
            border-radius: 24px; display: flex; justify-content: space-between; 
            font-weight: 900; font-size: 18px; z-index: 100; cursor: pointer; border: none;
            box-shadow: 0 0 25px rgba(30, 215, 96, 0.6), 0 10px 40px rgba(30, 215, 96, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 20px rgba(30, 215, 96, 0.4); } 50% { box-shadow: 0 0 35px rgba(30, 215, 96, 0.7); } 100% { box-shadow: 0 0 20px rgba(30, 215, 96, 0.4); } }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 200; display: flex; align-items: flex-end; }
        .drawer { background: #0a0a0a; width: 100%; border-top: 2px solid #1ed76033; border-radius: 40px 40px 0 0; padding: 40px 30px; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .input-dark { width: 100%; background: #000; border: 2px solid #222; padding: 20px; border-radius: 20px; color: #fff; font-size: 22px; font-weight: 900; text-align: center; margin-bottom: 30px; }
        .input-dark:focus { border-color: var(--main); box-shadow: 0 0 15px rgba(30,215,96,0.2); }

        .modal-full { position: fixed; inset: 0; background: #000; z-index: 300; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .success-card { background: #111; border: 1px solid var(--main); border-radius: 45px; padding: 50px 30px; width: 100%; text-align: center; box-shadow: 0 0 60px rgba(30,215,96,0.15); }

        .code-box { background: #000; padding: 25px; border-radius: 25px; border: 2px dashed #333; margin: 25px 0; }
        .code-val { font-size: 48px; font-weight: 900; letter-spacing: 8px; color: var(--main); text-shadow: 0 0 20px rgba(30,215,96,0.5); }

        /* Отступы в админке */
        .order-card { background: #111; border-left: 6px solid var(--main); border-radius: 24px; padding: 30px; margin-bottom: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-ready { width: 100%; background: var(--main); border: none; padding: 20px; border-radius: 18px; font-weight: 900; font-size: 17px; cursor: pointer; transition: 0.2s; }
        .btn-ready:active { transform: scale(0.96); }
    </style>
</head>
