<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neo Coffee</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 400px; margin: 0 auto; padding: 20px; }
        .card { background: #111; border: 1px solid #222; border-radius: 18px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; }
        .icon { font-size: 24px; }
        .info { flex-grow: 1; }
        .name { font-weight: bold; font-size: 16px; }
        .price { color: #888; font-size: 14px; }
        .btn-plus { background: #1ed760; color: #000; border: none; width: 40px; height: 40px; border-radius: 12px; font-size: 24px; font-weight: bold; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 360px; background: #1ed760; color: #000; padding: 18px; border-radius: 20px; display: flex; justify-content: space-between; font-weight: bold; cursor: pointer; box-shadow: 0 10px 30px rgba(30, 215, 96, 0.3); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #111; border: 1px solid #1ed760; border-radius: 24px; padding: 30px; width: 100%; max-width: 320px; text-align: center; }
        .input-table { width: 100%; padding: 15px; background: #222; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 15px; text-align: center; font-size: 18px; }
        .btn-order { width: 100%; padding: 15px; background: #1ed760; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const SUPABASE_URL = 'https://hrwcongjgvafgmwdjurz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhyd2NvbmdqZ3ZhZmdtd2RqdXJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NDkzOTEsImV4cCI6MjA4ODUyNTM5MX0.8ZntmliyiZf14JnqmbxnmUHuqXyEfaxBATDuc69mQF0';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const menu = [
            { id: 1, name: 'Эспрессо', price: 800, icon: '☕' },
            { id: 2, name: 'Капучино', price: 1200, icon: '🥤' },
            { id: 3, name: 'Латте', price: 1400, icon: '🥛' },
            { id: 4, name: 'Американо', price: 900, icon: '☕' },
            { id: 5, name: 'Раф Кофе', price: 1600, icon: '🍦' }
        ];

        function App() {
            const [cart, setCart] = useState({});
            const [table, setTable] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);

            const total = Object.keys(cart).reduce((sum, id) => sum + (menu.find(m => m.id === +id).price * cart[id]), 0);

            const order = async () => {
                if (!table) return alert("Укажите номер стола!");
                const { error } = await supabase.from('orders').insert([{ table_number: table, items: cart, total: total }]);
                if (!error) setShowSuccess(true);
            };

            return (
                <div className="container">
                    <h1 style={{textAlign: 'center'}}>Neo Coffee</h1>
                    {menu.map(item => (
                        <div key={item.id} className="card">
                            <div className="icon">{item.icon}</div>
                            <div className="info">
                                <div className="name">{item.name}</div>
                                <div className="price">{item.price} ₸</div>
                            </div>
                            <button className="btn-plus" onClick={() => setCart({...cart, [item.id]: (cart[item.id] || 0) + 1})}>
                                {cart[item.id] ? `x${cart[item.id]}` : '+'}
                            </button>
                        </div>
                    ))}

                    {total > 0 && !showSuccess && (
                        <div className="cart-bar" onClick={() => {
                            const t = prompt("Введите номер стола:");
                            if(t) { setTable(t); order(); }
                        }}>
                            <span>КОРЗИНА</span>
                            <span>{total} ₸</span>
                        </div>
                    )}

                    {showSuccess && (
                        <div className="modal">
                            <div className="modal-content">
                                <h2 style={{color: '#1ed760'}}>ПРИНЯТО! ✅</h2>
                                <p>Оплатите на Kaspi:<br/><b>+7 (707) 123-45-67</b></p>
                                <button className="btn-order" onClick={() => {setCart({}); setShowSuccess(false);}}>OK</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
