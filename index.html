<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neo Coffee</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main: #1ed760; --bg: #000; --card: #111; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Анимация появления */
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .container { max-width: 450px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
        
        /* Меню */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .lang-btn { background: #111; border: 1px solid #222; color: #444; padding: 5px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; margin-right: 5px; }
        .lang-btn.active { background: #fff; color: #000; border-color: #fff; }

        .menu-item { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .menu-info { display: flex; align-items: center; gap: 15px; }
        .menu-icon { font-size: 28px; }
        .menu-text .name { font-weight: 800; font-size: 16px; }
        .menu-text .price { color: #666; font-size: 14px; }
        .add-btn { background: var(--main); color: #000; border: none; width: 40px; height: 40px; border-radius: 12px; font-weight: bold; font-size: 20px; cursor: pointer; }

        /* Кнопка корзины */
        .cart-trigger { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: var(--main); color: #000; padding: 18px; border-radius: 20px; display: flex; justify-content: space-between; font-weight: 900; box-shadow: 0 10px 40px rgba(30,215,96,0.3); z-index: 99; cursor: pointer; }

        /* Окна (Modals) */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: flex-end; }
        .drawer { background: #111; width: 100%; border-top: 1px solid #222; border-radius: 30px 30px 0 0; padding: 30px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-center { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .success-card { background: #111; border: 1px solid var(--main); border-radius: 35px; padding: 30px; width: 100%; max-width: 350px; text-align: center; }

        /* Поля ввода */
        .input-dark { width: 100%; background: #000; border: 1px solid #333; padding: 15px; border-radius: 15px; color: #fff; font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 20px; outline: none; }
        .input-dark:focus { border-color: var(--main); }

        /* Админка */
        .order-card { background: #111; border-left: 4px solid var(--main); border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .btn-ready { width: 100%; background: var(--main); border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const SUPABASE_URL = 'https://hrwcongjgvafgmwdjurz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhyd2NvbmdqZ3ZhZmdtd2RqdXJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NDkzOTEsImV4cCI6MjA4ODUyNTM5MX0.8ZntmliyiZf14JnqmbxnmUHuqXyEfaxBATDuc69mQF0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_PASSWORD = "777";
        const KASPI_NUMBER = "+7 (707) 123-45-67";

        const menu = [
            { id: 1, name: {ru: 'Эспрессо', kk: 'Эспрессо', en: 'Espresso'}, price: 800, icon: '☕' },
            { id: 2, name: {ru: 'Капучино', kk: 'Капучино', en: 'Cappuccino'}, price: 1200, icon: '🥤' },
            { id: 3, name: {ru: 'Латте', kk: 'Латте', en: 'Latte'}, price: 1400, icon: '🥛' },
            { id: 4, name: {ru: 'Американо', kk: 'Американо', en: 'Americano'}, price: 900, icon: '☕' },
            { id: 5, name: {ru: 'Раф Клубничный', kk: 'Кұлпынай Раф', en: 'Strawberry Raf'}, price: 1600, icon: '🍓' }
        ];

        function App() {
            const [view, setView] = useState('client');
            const [lang, setLang] = useState('ru');
            const [cart, setCart] = useState({});
            const [table, setTable] = useState('');
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [orderResult, setOrderResult] = useState(null);
            const [orders, setOrders] = useState([]);
            const [adminPass, setAdminPass] = useState('');

            const t = {
                ru: { cart: "КОРЗИНА", order: "ЗАКАЗАТЬ", table: "№ Стола", pay_info: "Оплата на кассе или Kaspi:", code: "ВАШ КОД:", instr: "Покажите этот код кассиру", ready: "ГОТОВО", total: "Сумма" },
                kk: { cart: "СЕБЕТ", order: "ТАПСЫРЫС", table: "Үстел №", pay_info: "Кассада немесе Kaspi-мен төлеу:", code: "СІЗДІҢ КОДЫҢЫЗ:", instr: "Бұл кодты кассирге көрсетіңіз", ready: "ДАЙЫН", total: "Жиыны" },
                en: { cart: "CART", order: "ORDER", table: "Table No.", pay_info: "Pay at counter or Kaspi:", code: "YOUR CODE:", instr: "Show this code to cashier", ready: "READY", total: "Total" }
            }[lang];

            useEffect(() => {
                if (view === 'barista') {
                    fetchOrders();
                    const channel = supabase.channel('realtime').on('postgres_changes', {event:'*', schema:'public', table:'orders'}, fetchOrders).subscribe();
                    return () => supabase.removeChannel(channel);
                }
            }, [view]);

            const fetchOrders = async () => {
                const { data } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
                if (data) setOrders(data);
            };

            const total = Object.keys(cart).reduce((s, id) => s + (menu.find(m => m.id === +id).price * cart[id]), 0);

            const sendOrder = async () => {
                if (!table) return alert(t.table);
                const code = Math.random().toString(36).substring(2, 6).toUpperCase();
                const { error } = await supabase.from('orders').insert([{ table_number: table, items: cart, total: total, order_code: code }]);
                if (!error) {
                    setOrderResult(code);
                    setIsCartOpen(false);
                }
            };

            return (
                <div className="container fade-in">
                    <div className="header">
                        <div>
                            {['kk','ru','en'].map(l => (
                                <button key={l} className={`lang-btn ${lang === l ? 'active' : ''}`} onClick={() => setLang(l)}>{l.toUpperCase()}</button>
                            ))}
                        </div>
                        <h2 onClick={() => {const p = prompt("Password?"); if(p === ADMIN_PASSWORD) setView('barista')}} style={{margin:0, letterSpacing:'-1px'}}>NEO COFFEE</h2>
                    </div>

                    {view === 'client' ? (
                        <>
                            {menu.map(item => (
                                <div key={item.id} className="menu-item fade-in">
                                    <div className="menu-info">
                                        <div className="menu-icon">{item.icon}</div>
                                        <div className="menu-text">
                                            <div className="name">{item.name[lang]}</div>
                                            <div className="price">{item.price} ₸</div>
                                        </div>
                                    </div>
                                    <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                                        {cart[item.id] > 0 && <span style={{fontWeight:'bold', color: 'var(--main)'}}>x{cart[item.id]}</span>}
                                        <button className="add-btn" onClick={() => setCart({...cart, [item.id]: (cart[item.id] || 0) + 1})}>+</button>
                                    </div>
                                </div>
                            ))}

                            {total > 0 && (
                                <div className="cart-trigger" onClick={() => setIsCartOpen(true)}>
                                    <span>{t.cart}</span>
                                    <span>{total} ₸</span>
                                </div>
                            )}
                        </>
                    ) : (
                        <div className="fade-in">
                            <button onClick={() => setView('client')} className="lang-btn active" style={{marginBottom:'20px'}}>ВЫХОД</button>
                            {orders.map(o => (
                                <div key={o.id} className="order-card">
                                    <div className="order-header">
                                        <b>Стол: {o.table_number}</b>
                                        <b style={{color: 'var(--main)'}}>КОД: {o.order_code}</b>
                                    </div>
                                    <div style={{fontSize:'14px', marginBottom:'10px', color:'#999'}}>
                                        {Object.entries(o.items).map(([id, count]) => (
                                            <div key={id}>{menu.find(m => m.id === +id).name[lang]} x{count}</div>
                                        ))}
                                    </div>
                                    <div style={{fontWeight:'bold', marginBottom:'15px'}}>{t.total}: {o.total} ₸</div>
                                    <button className="btn-ready" onClick={() => supabase.from('orders').delete().eq('id', o.id)}>ГОТОВО</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {isCartOpen && (
                        <div className="overlay" onClick={() => setIsCartOpen(false)}>
                            <div className="drawer" onClick={e => e.stopPropagation()}>
                                <h2 style={{marginTop:0}}>{t.cart}</h2>
                                <input type="number" placeholder={t.table} className="input-dark" value={table} onChange={e => setTable(e.target.value)} />
                                <div style={{marginBottom:'20px'}}>
                                    {Object.entries(cart).map(([id, count]) => (
                                        <div key={id} style={{display:'flex', justifyContent:'space-between', marginBottom:'10px'}}>
                                            <span>{menu.find(m => m.id === +id).name[lang]}</span>
                                            <b>x{count}</b>
                                        </div>
                                    ))}
                                </div>
                                <button className="cart-trigger" style={{position:'static', width:'100%', transform:'none'}} onClick={sendOrder}>
                                    {t.order} — {total} ₸
                                </button>
                            </div>
                        </div>
                    )}

                    {orderResult && (
                        <div className="modal-center">
                            <div className="success-card fade-in">
                                <div style={{fontSize:'50px', marginBottom:'10px'}}>✅</div>
                                <h2 style={{margin:'0 0 10px 0'}}>ПРИНЯТО!</h2>
                                <p style={{color:'#666', fontSize:'14px'}}>{t.pay_info}</p>
                                <h3 style={{color:'var(--main)', margin:'5px 0 20px 0'}}>{KASPI_NUMBER}</h3>
                                
                                <div style={{background:'#000', padding:'15px', borderRadius:'15px', border:'1px dashed #333'}}>
                                    <div style={{fontSize:'10px', color:'#666'}}>{t.code}</div>
                                    <div style={{fontSize:'32px', fontWeight:'900', letterSpacing:'5px'}}>{orderResult}</div>
                                </div>
                                <p style={{fontSize:'12px', color:'#555', marginTop:'15px'}}>{t.instr}</p>
                                <button className="btn-ready" style={{marginTop:'25px'}} onClick={() => {setCart({}); setOrderResult(null); setTable('');}}>OK</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
