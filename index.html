<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neo Coffee App</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background-color: #050505; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-border { border: 1px solid #1ed760; box-shadow: 0 0 15px rgba(30, 215, 96, 0.2); }
        .btn-green { background: #1ed760; color: black; font-weight: 800; transition: all 0.2s; }
        .btn-green:active { transform: scale(0.95); filter: brightness(0.8); }
        input:focus { outline: none; border-color: #1ed760; }
        .order-card { border-left: 4px solid #1ed760; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://hrwcongjgvafgmwdjurz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhyd2NvbmdqZ3ZhZmdtd2RqdXJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NDkzOTEsImV4cCI6MjA4ODUyNTM5MX0.8ZntmliyiZf14JnqmbxnmUHuqXyEfaxBATDuc69mQF0';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_PASSWORD = "777";
        const KASPI_NUMBER = "+7 (707) 123-45-67"; // Поменяй на свой номер здесь

        const translations = {
            ru: {
                cart: "Корзина", table: "№ Стола", ready: "Готово", exit: "Выход",
                admin_title: "Доступ", pass: "Пароль", login: "Войти", place_order: "Заказать",
                success_title: "Заказ принят! ✅", success_msg: "Ваш столик:", 
                pay_cash: "1. Оплатите на кассе", pay_kaspi: "2. Перевод на Kaspi:",
                pay_instruction: "Покажите чек кассиру и назовите свой код.",
                error_table: "Укажите стол!", order_code: "КОД ЗАКАЗА:", total: "ИТОГО"
            },
            kk: {
                cart: "Себет", table: "Үстел №", ready: "Дайын", exit: "Шығу",
                admin_title: "Кіру", pass: "Құпия сөз", login: "Кіру", place_order: "Тапсырыс беру",
                success_title: "Тапсырыс қабылданды! ✅", success_msg: "Сіздің үстеліңіз:",
                pay_cash: "1. Кассада төлеңіз", pay_kaspi: "2. Kaspi-ге аударым:",
                pay_instruction: "Кассирге чекті көрсетіп, кодыңызды айтыңыз.",
                error_table: "Үстелді жазыңыз!", order_code: "ТАПСЫРЫС КОДЫ:", total: "ЖИЫНЫ"
            },
            en: {
                cart: "Cart", table: "Table No.", ready: "Ready", exit: "Exit",
                admin_title: "Access", pass: "Password", login: "Login", place_order: "Order",
                success_title: "Order Received! ✅", success_msg: "Your table:",
                pay_cash: "1. Pay at the counter", pay_kaspi: "2. Kaspi Transfer:",
                pay_instruction: "Show the receipt to the cashier and say your code.",
                error_table: "Table required!", order_code: "ORDER CODE:", total: "TOTAL"
            }
        };

        const menu = [
            { id: 1, name: {ru: 'Эспрессо', en: 'Espresso', kk: 'Эспрессо'}, price: 800, icon: '☕' },
            { id: 2, name: {ru: 'Капучино', en: 'Cappuccino', kk: 'Капучино'}, price: 1200, icon: '🥤' },
            { id: 3, name: {ru: 'Латте', en: 'Latte', kk: 'Латте'}, price: 1400, icon: '🥛' },
            { id: 4, name: {ru: 'Американо', en: 'Americano', kk: 'Американо'}, price: 900, icon: '☕' },
            { id: 5, name: {ru: 'Раф Кофе', en: 'Raf Coffee', kk: 'Раф Кофе'}, price: 1600, icon: '🍦' },
        ];

        function App() {
            const [view, setView] = useState('client');
            const [lang, setLang] = useState('ru');
            const [cart, setCart] = useState({});
            const [tableNumber, setTableNumber] = useState('');
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [orders, setOrders] = useState([]);
            const [showSuccess, setShowSuccess] = useState(false);
            const [currentOrderCode, setCurrentOrderCode] = useState('');
            const [adminPass, setAdminPass] = useState('');
            const [isAdminOpen, setIsAdminOpen] = useState(false);

            const t = translations[lang];

            useEffect(() => {
                if (view === 'barista') {
                    fetchOrders();
                    const sub = supabaseClient.channel('orders_channel').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, fetchOrders).subscribe();
                    return () => { supabaseClient.removeChannel(sub) };
                }
            }, [view]);

            const fetchOrders = async () => {
                const { data } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
                if (data) setOrders(data);
            };

            const updateCart = (id, delta) => {
                setCart(prev => {
                    const next = { ...prev, [id]: (prev[id] || 0) + delta };
                    if (next[id] <= 0) delete next[id];
                    return { ...next };
                });
            };

            const total = Object.keys(cart).reduce((sum, id) => sum + (menu.find(m => m.id === +id).price * cart[id]), 0);

            const handleOrder = async () => {
                if (!tableNumber) return alert(t.error_table);
                const orderCode = Math.random().toString(36).substring(2, 6).toUpperCase();
                const { error } = await supabaseClient.from('orders').insert([{ 
                    table_number: tableNumber, 
                    items: cart, 
                    total: total,
                    order_code: orderCode 
                }]);
                if (!error) {
                    setCurrentOrderCode(orderCode);
                    setShowSuccess(true);
                    setIsCartOpen(false);
                }
            };

            return (
                <div className="min-h-screen p-5 max-w-md mx-auto relative">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-8 mt-2">
                        <div className="flex gap-2">
                            {['kk','ru','en'].map(l => (
                                <button key={l} onClick={() => setLang(l)} className={`text-[10px] px-2 py-1 rounded-md font-bold ${lang === l ? 'bg-white text-black' : 'text-gray-600 border border-gray-800'}`}>{l.toUpperCase()}</button>
                            ))}
                        </div>
                        <h1 onClick={() => setIsAdminOpen(true)} className="font-black text-xl tracking-tighter cursor-pointer">NEO COFFEE</h1>
                    </div>

                    {view === 'client' ? (
                        <div className="animate__animated animate__fadeIn">
                            <div className="text-center mb-8">
                                <span className="text-[10px] text-green-500 font-bold tracking-widest uppercase">● Online Ordering Available</span>
                            </div>

                            {menu.map(item => (
                                <div key={item.id} className="glass rounded-3xl p-4 mb-4 flex items-center justify-between animate__animated animate__fadeInUp">
                                    <div className="flex items-center gap-4">
                                        <div className="text-3xl">{item.icon}</div>
                                        <div>
                                            <div className="font-bold">{item.name[lang]}</div>
                                            <div className="text-gray-400 text-sm">{item.price} ₸</div>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        {cart[item.id] > 0 && <span className="text-green-500 font-bold">x{cart[item.id]}</span>}
                                        <button onClick={() => updateCart(item.id, 1)} className="btn-green w-10 h-10 rounded-xl text-xl">+</button>
                                    </div>
                                </div>
                            ))}

                            {total > 0 && (
                                <div onClick={() => setIsCartOpen(true)} className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass neon-border p-5 rounded-3xl flex justify-between items-center cursor-pointer animate__animated animate__slideInUp">
                                    <span className="font-black text-sm">{t.cart.toUpperCase()}</span>
                                    <span className="font-black text-lg">{total} ₸</span>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="animate__animated animate__fadeIn">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-2xl font-black italic">ORDERS</h2>
                                <button onClick={() => setView('client')} className="btn-green px-4 py-1 rounded-lg text-xs">EXIT</button>
                            </div>
                            {orders.map(o => (
                                <div key={o.id} className="glass p-5 rounded-2xl mb-4 order-card animate__animated animate__fadeInLeft">
                                    <div className="flex justify-between items-start mb-3">
                                        <div>
                                            <div className="text-xs text-gray-500">{t.table}</div>
                                            <div className="text-xl font-black">{o.table_number}</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-xs text-green-500 font-bold">{t.order_code}</div>
                                            <div className="text-xl font-mono font-black">{o.order_code}</div>
                                        </div>
                                    </div>
                                    <div className="space-y-1 mb-4 border-t border-gray-800 pt-3">
                                        {Object.entries(o.items).map(([id, count]) => (
                                            <div key={id} className="text-sm flex justify-between">
                                                <span>{menu.find(m => m.id === +id).name[lang]}</span>
                                                <span className="font-bold">x{count}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={() => supabaseClient.from('orders').delete().eq('id', o.id)} className="w-full btn-green py-3 rounded-xl">{t.ready.toUpperCase()}</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* MODAL: CART */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-50 flex items-end">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative w-full glass rounded-t-[40px] p-8 animate__animated animate__slideInUp">
                                <h2 className="text-2xl font-black mb-6">{t.cart}</h2>
                                <input type="number" placeholder={t.table} value={tableNumber} onChange={e => setTableNumber(e.target.value)} className="input-table w-full mb-6" />
                                <div className="space-y-4 mb-8">
                                    {Object.entries(cart).map(([id, count]) => (
                                        <div key={id} className="flex justify-between items-center">
                                            <span>{menu.find(m => m.id === +id).name[lang]}</span>
                                            <div className="flex gap-4 items-center">
                                                <button onClick={() => updateCart(+id, -1)} className="text-gray-500 text-xl">—</button>
                                                <span className="font-bold">{count}</span>
                                                <button onClick={() => updateCart(+id, 1)} className="text-green-500 text-xl">+</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={handleOrder} className="w-full btn-green py-5 rounded-2xl text-lg uppercase tracking-tighter">{t.place_order} — {total} ₸</button>
                            </div>
                        </div>
                    )}

                    {/* MODAL: SUCCESS */}
                    {showSuccess && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/95">
                            <div className="glass neon-border w-full max-w-xs rounded-[32px] p-8 text-center animate__animated animate__zoomIn">
                                <div className="text-5xl mb-4">✅</div>
                                <h2 className="text-xl font-black mb-2">{t.success_title}</h2>
                                <p className="text-gray-400 text-sm mb-6">{t.success_msg} <span className="text-white font-bold">{tableNumber}</span></p>
                                
                                <div className="bg-white/5 rounded-2xl p-4 mb-6">
                                    <div className="text-[10px] text-green-500 font-bold mb-1">{t.order_code}</div>
                                    <div className="text-3xl font-mono font-black tracking-widest">{currentOrderCode}</div>
                                </div>

                                <div className="text-left text-xs space-y-3 mb-8 bg-black p-4 rounded-xl border border-gray-800">
                                    <p className="flex justify-between"><span>{t.pay_cash}</span></p>
                                    <p className="flex flex-col gap-1">
                                        <span>{t.pay_kaspi}</span>
                                        <span className="text-green-500 font-bold text-lg">{KASPI_NUMBER}</span>
                                    </p>
                                    <p className="text-gray-500 italic mt-2">{t.pay_instruction}</p>
                                </div>

                                <button onClick={() => {setShowSuccess(false); setCart({}); setTableNumber('');}} className="w-full btn-green py-4 rounded-xl">OK</button>
                            </div>
                        </div>
                    )}

                    {/* MODAL: ADMIN LOGIN */}
                    {isAdminOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90">
                            <div className="glass rounded-[32px] p-8 w-full max-w-xs animate__animated animate__fadeIn">
                                <h2 className="text-center font-black mb-6">{t.admin_title.toUpperCase()}</h2>
                                <input type="password" placeholder={t.pass} className="input-table w-full mb-4" value={adminPass} onChange={e => setAdminPass(e.target.value)} />
                                <button onClick={() => adminPass === ADMIN_PASSWORD ? (setView('barista'), setIsAdminOpen(false), setAdminPass('')) : alert('Error')} className="w-full btn-green py-4 rounded-xl mb-3">{t.login}</button>
                                <button onClick={() => setIsAdminOpen(false)} className="w-full text-gray-600 text-sm">Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
